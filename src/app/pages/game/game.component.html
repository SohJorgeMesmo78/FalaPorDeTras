<div class="container game" *ngIf="game">
  <!-- Top Header with Brand and Social Links -->
  <header class="game-header">
    <a routerLink="/" class="back-btn" aria-label="Voltar">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </a>
    <div class="brand">Fala por de trás</div>
    <div class="socials">
      <a [href]="instagramUrl" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
      </a>
      <a [href]="tiktokUrl" target="_blank" rel="noopener noreferrer" aria-label="TikTok">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg>
      </a>
    </div>
  </header>

  <!-- Game Content -->
  <main class="game-content">
    <div class="image-wrapper">
      <img [src]="game.imageUrl" [alt]="game.name" />
    </div>
    
    <div class="details" *ngIf="!showPlayerSelector">
      <h1>{{ game.name }}</h1>
      <p class="description">{{ game.description }}</p>

      <div class="player-stepper" *ngIf="game.id === 'ito' || game.id === 'batata-quente' || game.id === 'pergunta-do-impostor'">
        <label>Número de Jogadores:</label>
        <div class="stepper-controls">
          <button class="step-btn" (click)="players = players - 1; imposters = imposters > maxImposters ? maxImposters : imposters" [disabled]="players <= minPlayers">-</button>
          <span class="step-value">{{ players }}</span>
          <button class="step-btn" (click)="players = players + 1" [disabled]="players >= 100">+</button>
        </div>
      </div>

      <div class="player-stepper" *ngIf="game.id === 'pergunta-do-impostor'" style="margin-top: 16px;">
        <label>Quantidade de Impostores:</label>
        <div class="stepper-controls">
          <button class="step-btn" (click)="imposters = imposters - 1" [disabled]="imposters <= 1">-</button>
          <span class="step-value">{{ imposters }}</span>
          <button class="step-btn" (click)="imposters = imposters + 1" [disabled]="imposters >= maxImposters">+</button>
        </div>
        <small style="color: var(--text-muted); display: block; text-align: center; margin-top: 8px;">(Máximo permitido: {{ maxImposters }})</small>
      </div>
      
      <button class="btn-primary" (click)="openPlayerConfig()">
        Continuar
      </button>
    </div>

    <!-- Player Customization Section -->
    <div class="details player-config" *ngIf="showPlayerSelector">
      <h1>Quem vai jogar?</h1>
      <p class="description">Escolha os nomes e cores dos jogadores!</p>

      <div class="players-list">
        <div class="player-input-card" *ngFor="let p of gameService.customPlayers">
          <div class="color-preview" [style.background]="p.color" (click)="randomizeColor(p)">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
          </div>
          <input type="text" [(ngModel)]="p.name" (ngModelChange)="checkSpecialName(p)" [placeholder]="'Jogador ' + p.id" maxlength="15" />
        </div>
      </div>

      <div style="display: flex; gap: 12px; width: 100%; margin-top: 24px;">
        <button class="btn-secondary" (click)="showPlayerSelector = false" style="flex: 1;">Voltar</button>
        <button class="btn-primary" (click)="startGameWithPlayers()" style="flex: 2;">Iniciar o Jogo</button>
      </div>
    </div>
  </main>
</div>

<div class="container loading" *ngIf="!game">
  <p>Carregando jogo...</p>
</div>
