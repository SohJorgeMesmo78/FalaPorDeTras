<div class="container game" [ngClass]="{'exploded-bg': gameState === 'exploded'}">
  <header class="game-header">
    <a routerLink="/game/batata-quente" class="back-btn" aria-label="Voltar">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </a>
    <div class="brand">Batata Quente</div>
    
    <div style="display: flex; gap: 8px; align-items: center;">
      <div class="socials">
        <a href="https://www.instagram.com/falapordetras" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
        </a>
        <a href="https://www.tiktok.com/@falapordetras" target="_blank" rel="noopener noreferrer" aria-label="TikTok">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg>
        </a>
      </div>
    </div>
  </header>

  <main class="game-content playing" [ngStyle]="{'background': gameState === 'exploded' ? 'none' : ''}">
    
    <!-- SETUP -->
    <ng-container *ngIf="gameState === 'setup'">
      <div class="playing-wrapper reveal-animation">
        <div class="label" style="margin-bottom: 24px;">O Tema Sorteado é:</div>
        <div class="secret-word" style="font-size: 2.5rem; color: var(--text-main); margin-bottom: 24px;">{{ theme }}</div>

        <button class="btn-secondary" (click)="changeTheme()" style="margin-bottom: 40px; padding: 12px 24px; border: 1px solid var(--primary); font-size: 1rem;">
          Trocar Tema
        </button>
        
        <div class="timer-setup" style="display: flex; align-items: center; justify-content: center; gap: 24px; margin-bottom: 48px; background: rgba(0,0,0,0.3); padding: 24px 32px; border-radius: 20px;">
          <button class="time-adjust-btn" (click)="decreaseTime()" [disabled]="timerValueSeconds <= 30">-</button>
          <div style="font-size: 3.5rem; font-weight: 900; font-variant-numeric: tabular-nums;">{{ formattedTime }}</div>
          <button class="time-adjust-btn" (click)="increaseTime()" [disabled]="timerValueSeconds >= 180">+</button>
        </div>

        <button class="btn-primary" (click)="startGame()" style="margin-bottom: 24px;">
          Iniciar Jogo
        </button>

        <a routerLink="/" class="btn-secondary" style="border: none; text-decoration: underline;">
          Menu Inicial
        </a>
      </div>
    </ng-container>

    <!-- PLAYING -->
    <ng-container *ngIf="gameState === 'playing'">
      <div class="playing-wrapper reveal-animation" style="padding: 24px; min-height: 500px; display: flex; flex-direction: column;">
        <div class="label" style="font-size: 1.2rem; color: var(--primary); margin-bottom: 12px;">TEMA ATUAL:</div>
        <div class="theme-text" style="font-size: 1.8rem; font-weight: 800; margin-bottom: 32px; text-transform: uppercase;">{{ theme }}</div>
        
        <div class="timer-text" [ngClass]="{'danger-pulse': timerValueSeconds <= 10}" style="font-size: 5rem; font-weight: 900; font-variant-numeric: tabular-nums; margin-bottom: auto; letter-spacing: 2px;">
          {{ formattedTime }}
        </div>

        <button class="btn-primary" (click)="passBomb()" style="margin-top: auto; border-radius: 24px; padding: 48px 20px; font-size: 2rem; display: flex; flex-direction: column; align-items: center; gap: 12px; box-shadow: 0 0 40px rgba(29, 174, 193, 0.4);">
          <span style="font-size: 1.1rem; opacity: 0.9; text-transform: none; letter-spacing: normal;">É a vez do</span>
          JOGADOR {{ currentPlayer }}
          <span style="font-size: 1rem; opacity: 0.6; text-transform: none; font-weight: 600; margin-top: 8px;">(Clique para passar a bomba)</span>
        </button>
      </div>
    </ng-container>

    <!-- EXPLODED -->
    <ng-container *ngIf="gameState === 'exploded'">
      <div class="playing-wrapper bounce-in" style="height: 100%; display: flex; flex-direction: column; justify-content: center;">
        <div class="label" style="color: #ff4a4a; font-size: 3rem; font-weight: 900; margin-bottom: 16px; text-shadow: 0 0 30px rgba(255, 74, 74, 0.8);">KABOOM!</div>
        <div class="secret-word" style="font-size: 4rem; margin-bottom: 48px; line-height: 1.2;">
          <span style="display:block; font-size: 1.5rem; margin-bottom: 16px; color: #fff;">O Jogador {{ currentPlayer }} explodiu! 💣</span>
        </div>

        <button class="btn-primary redo-btn" (click)="resetGame()" style="margin-bottom: 24px; background: #ff4a4a; box-shadow: 0 8px 30px rgba(255, 74, 74, 0.5);">
          Jogar Novamente
        </button>
        <a routerLink="/" class="btn-secondary" style="border: none; text-decoration: underline;">
          Menu Inicial
        </a>
      </div>
    </ng-container>

  </main>
</div>
