<div class="container game">
  <app-header backUrl="/game/jogo-da-lista"></app-header>

  <main class="game-content playing">
    <div class="game-title-row">
      <h2>Jogo da Lista</h2>
    </div>

    <div class="playing-wrapper reveal-animation" style="height: 100%; display: flex; flex-direction: column; padding: 24px;">
      <div class="label" style="font-size: 1.2rem; color: var(--primary); margin-bottom: 24px; text-align: center;">PALAVRAS DA RODADA:</div>
      
      <div class="words-list" style="display: flex; flex-direction: column; gap: 12px; width: 100%; margin-bottom: 32px;">
        <div class="word-card" *ngFor="let word of words; let i = index" style="display: flex; align-items: center; justify-content: space-between; background: rgba(255, 255, 255, 0.05); padding: 16px 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);">
          <div style="display: flex; align-items: center; gap: 16px;">
            <span style="font-size: 1.2rem; font-weight: 800; color: var(--primary); opacity: 0.6;">{{ i + 1 }}</span>
            <span style="font-size: 1.5rem; font-weight: 700; color: #fff;">{{ word }}</span>
          </div>
          
          <button (click)="shuffleOne(i)" style="background: none; border: none; color: var(--text-muted); cursor: pointer; transition: all 0.2s;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-muted)'">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
          </button>
        </div>
      </div>

      <div style="width: 100%; display: flex; flex-direction: column; gap: 16px;">
        <button class="btn-primary" (click)="shuffleAll()">
          Trocar Todas as Palavras
        </button>
        
        <a routerLink="/" class="btn-secondary" style="border: none; text-decoration: underline;">
          Menu Inicial
        </a>
      </div>
    </div>
  </main>
</div>
