<div class="container game">
  <header class="game-header">
    <a routerLink="/game/pergunta-do-impostor" class="back-btn" aria-label="Voltar">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </a>
    <div class="brand">Pergunta do Impostor</div>
    
    <div style="display: flex; gap: 8px; align-items: center;">
      <div class="socials">
        <a href="https://www.instagram.com/falapordetras" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
        </a>
        <a href="https://www.tiktok.com/@falapordetras" target="_blank" rel="noopener noreferrer" aria-label="TikTok">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg>
        </a>
      </div>
    </div>
  </header>

  <main class="game-content playing">

    <!-- HIDDEN STATE (Pass the device) -->
    <ng-container *ngIf="gameState === 'hidden'">
      <div class="playing-wrapper reveal-animation" style="height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 24px;">
        <div class="label" style="font-size: 1.5rem; margin-bottom: 24px;">Passe o dispositivo para:</div>
        <div class="theme-text" style="font-size: 3rem; color: var(--primary); margin-bottom: 48px; font-weight: 900;">Jogador {{ currentPlayer }}</div>
        
        <button class="btn-primary" (click)="revealQuestion()" style="padding: 24px; border-radius: 20px; font-size: 1.5rem; margin-top: 24px; box-shadow: 0 0 30px rgba(29, 174, 193, 0.4);">
          Revelar Pergunta
        </button>
      </div>
    </ng-container>

    <!-- REVEALED STATE (Read the question) -->
    <ng-container *ngIf="gameState === 'revealed'">
      <div class="playing-wrapper reveal-animation" style="height: 100%; display: flex; flex-direction: column; padding: 24px;">
        <div class="label" style="font-size: 1.1rem; color: var(--primary); margin-bottom: 24px; letter-spacing: 1px;">SUA PERGUNTA É:</div>
        
        <div class="secret-word" style="font-size: 2.2rem; font-weight: 800; line-height: 1.4; margin-bottom: auto; margin-top: 24px;">
          {{ currentQuestion }}
        </div>
        
        <button class="btn-primary" (click)="nextPlayer()" style="margin-top: 48px; border-radius: 20px; font-size: 1.2rem; padding: 20px;">
          {{ currentPlayer < playersCount ? 'Ocultar e Próximo Jogador' : 'Ocultar e Finalizar Distribuição' }}
        </button>
      </div>
    </ng-container>

    <!-- FINISHED STATE (Debate) -->
    <ng-container *ngIf="gameState === 'finished'">
      <div class="playing-wrapper reveal-animation" style="height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 24px;">
        <div class="label" style="font-size: 1.5rem; color: #ffeb3b; margin-bottom: 24px; font-weight: 900;">A PERGUNTA DA RODADA ERA:</div>
        
        <div class="secret-word" style="font-size: 2rem; font-weight: 800; line-height: 1.4; margin-bottom: 32px; color: #fff;">
          {{ normalQuestion }}
        </div>

        <button class="btn-primary" (click)="resetGame()" style="margin-bottom: 24px;">
          Jogar Novamente
        </button>
        <a routerLink="/" class="btn-secondary" style="border: none; text-decoration: underline;">
          Menu Inicial
        </a>
      </div>
    </ng-container>

  </main>
</div>
