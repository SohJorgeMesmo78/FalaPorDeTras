<div class="container game">
  <header class="game-header">
    <a routerLink="/game/quem-sou-eu" class="back-btn" aria-label="Voltar">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </a>
    <div class="brand">Quem Sou Eu?</div>
    
    <div style="display: flex; gap: 8px; align-items: center;">
      <div class="socials">
        <a href="https://www.instagram.com/falapordetras" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
        </a>
        <a href="https://www.tiktok.com/@falapordetras" target="_blank" rel="noopener noreferrer" aria-label="TikTok">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg>
        </a>
      </div>
      <button class="toggle-btn" (click)="toggleCountdown()" [class.active]="gameService.showCountdown">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span class="tooltip">{{ gameService.showCountdown ? 'Desativar Contador' : 'Ativar Contador' }}</span>
      </button>
    </div>
  </header>

  <main class="game-content" [ngClass]="{'playing': gameState === 'playing', 'countdown': gameState === 'countdown'}">
    <!-- COUNTDOWN -->
    <ng-container *ngIf="gameState === 'countdown'">
      <div class="countdown-wrapper">
        <div class="countdown-number bounce-in">{{ countdownValue }}</div>
      </div>
    </ng-container>

    <!-- PLAYING -->
    <ng-container *ngIf="gameState === 'playing'">
      <div class="playing-wrapper">
        <div class="label">Você é o/a:</div>
        <div class="secret-word reveal-animation">{{ secretWord }}</div>
        
        <button class="btn-primary" (click)="startQuemSouEu()" style="display: flex; justify-content: center; align-items: center; gap: 8px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          Sortear Novamente
        </button>

        <a routerLink="/" class="btn-secondary" style="border: none; text-decoration: underline; margin-top: 16px;">
          Menu Inicial
        </a>
      </div>
    </ng-container>
  </main>
</div>
