<div class="container game">
  <header class="game-header">
    <a routerLink="/game/ito" class="back-btn" aria-label="Voltar">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </a>
    <div class="brand">Jogo ITO</div>
    
    <div style="display: flex; gap: 8px; align-items: center;">
      <div class="socials">
        <a href="https://www.instagram.com/falapordetras" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
        </a>
        <a href="https://www.tiktok.com/@falapordetras" target="_blank" rel="noopener noreferrer" aria-label="TikTok">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg>
        </a>
      </div>
    </div>
  </header>

  <main class="game-content playing">
    
    <!-- REVEAL_READY -->
    <ng-container *ngIf="gameState === 'reveal_ready'">
      <div class="playing-wrapper reveal-animation">
        <div class="label" style="margin-bottom: 32px;">Passe o dispositivo para:</div>
        <div class="secret-word" style="font-size: 3.5rem;">Jogador {{ currentPlayer }}</div>
        
        <button class="btn-primary" (click)="revealPlayerNumber()" style="margin-top: 48px; border-radius: 100px;">
          Revelar meu Número
        </button>
      </div>
    </ng-container>

    <!-- COUNTDOWN REMOVED -->

    <!-- REVEALED -->
    <ng-container *ngIf="gameState === 'revealed'">
      <div class="playing-wrapper">
        <div class="label">Jogador {{ currentPlayer }}, seu número é:</div>
        <div class="secret-word reveal-animation" style="font-size: 7rem; color: var(--primary);">{{ currentSecretNumber }}</div>

        <button class="btn-primary" (click)="nextPlayer()">
          {{ currentPlayer < playersCount ? 'Esconder Número' : 'Esconder e Ver Tema' }}
        </button>
      </div>
    </ng-container>

    <!-- FINISHED -->
    <ng-container *ngIf="gameState === 'finished'">
      <div class="playing-wrapper">
        <div class="label" style="font-size: 1.5rem;">O Tema da rodada é:</div>
        <div class="secret-word reveal-animation" style="font-size: 2.2rem; color: var(--text-main); margin-bottom: 60px;">{{ theme }}</div>

        <div style="display: flex; gap: 16px; width: 100%; margin-bottom: 24px;">
          <button class="btn-primary" (click)="changeTheme()" style="flex: 1; padding: 16px 8px;">
            Trocar Tema
          </button>
          <button class="btn-primary" (click)="generateNewGame()" style="flex: 1; padding: 16px 8px;">
            Jogar Novamente
          </button>
        </div>

        <a routerLink="/" class="btn-secondary" style="border: none; text-decoration: underline;">
          Menu Inicial
        </a>
      </div>
    </ng-container>

  </main>
</div>
