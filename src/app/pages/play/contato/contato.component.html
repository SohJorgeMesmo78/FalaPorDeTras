<div class="container game">
  <app-header backUrl="/game/contato"></app-header>

  <main class="game-content" [ngClass]="{'playing': shouldReveal, 'countdown': !shouldReveal}">
    
    <div class="game-title-row" *ngIf="shouldReveal">
      <h2>Contato</h2>
      <button class="toggle-btn" (click)="gameService.showCountdown = !gameService.showCountdown" [class.active]="gameService.showCountdown">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span class="tooltip">{{ gameService.showCountdown ? 'Desativar Timer' : 'Ativar Timer' }}</span>
      </button>
    </div>

    <!-- COUNTDOWN -->
    <ng-container *ngIf="!shouldReveal">
      <div class="countdown-wrapper">
        <div class="countdown-number bounce-in">{{ timerSeconds }}</div>
      </div>
    </ng-container>

    <!-- PLAYING -->
    <ng-container *ngIf="shouldReveal && secretWord">
      <div class="playing-wrapper">
        <div class="label reveal-animation">Sua Palavra É:</div>
        <div class="secret-word reveal-animation" style="margin-bottom: auto;">{{ secretWord }}</div>
        
        <div style="background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 16px; margin: 32px 0; border: 1px solid rgba(255,255,255,0.1);">
          <p style="color: var(--text-muted); font-size: 1.1rem; line-height: 1.6; margin: 0;">
            O <span style="color: var(--primary); font-weight: bold;">Mestre</span> não deve revelar essa palavra. Apenas forneça a <span style="font-weight: bold; color: #fff;">primeira letra</span> para os jogadores criarem conexões!
          </p>
        </div>

        <button class="btn-primary reveal-animation" style="margin-bottom: 24px;" (click)="refreshWord()">
          Nova Palavra
        </button>

        <a routerLink="/" class="btn-secondary reveal-animation" style="border: none; text-decoration: underline;">
          Menu Inicial
        </a>
      </div>
    </ng-container>

  </main>
</div>
